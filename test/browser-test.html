<!DOCTYPE html>
<html>
  <head>
    <title>multichain-lib ESM Tests</title>
  </head>
  <body>
    <script type="module">
      // The webpack ESM bundle exposes named exports. We import each
      // piece of the v3 root API and surface them on window.multichain
      // so the playwright spec can poke at them.
      import {
        create,
        chains,
        registerChain,
        createHashRegistry,
        version,
        versionGuard,
      } from '/dist/multichain-lib.mjs';
      window.multichain = {
        create,
        chains,
        registerChain,
        createHashRegistry,
        version,
        versionGuard,
      };
    </script>
  </body>
</html>
